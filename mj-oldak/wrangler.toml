[[d1_databases]]
binding = "DB"
database_name = "mj-oldak-newsletter"
database_id = "c1d7109b-bf50-4cf6-a129-dc99deeab471"

[vars]
PUBLIC_SITE_URL = "https://mjoldak.pl"
NEWSLETTER_FROM_EMAIL = "onboarding@resend.dev"
# ↑ Switch to "noreply@mjoldak.pl" after Resend domain verify completes
CONTACT_NOTIFICATION_TO = "marcin.oldak00@gmail.com"
