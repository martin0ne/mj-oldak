<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>MJ.OLDAK · Coastal Currents</title>
<link rel="stylesheet" href="/colors_and_type.css">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--color-dark); overflow:hidden; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .hud {
    position:absolute; left:28px; top:24px; z-index:2;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.14em;
    color: color-mix(in srgb, var(--color-primary) 60%, transparent);
  }
  .hud .dot { display:inline-block; width:6px; height:6px; border-radius:999px; background:var(--color-accent); margin-right:8px; vertical-align:middle; animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  .title {
    position:absolute; left:28px; bottom:32px; z-index:2;
    font-family:'Manrope', sans-serif; font-weight:800; letter-spacing:-0.02em;
    color: var(--color-primary);
    font-size: clamp(40px, 5vw, 72px);
    line-height:1;
  }
  .title em { font-family:'Fraunces', serif; font-style:italic; font-weight:400; font-variation-settings:'opsz' 144, 'SOFT' 100; }
  .meta { position:absolute; right:28px; bottom:32px; z-index:2; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; color: color-mix(in srgb, var(--color-primary) 50%, transparent); text-align:right; line-height:1.6; }
</style>
<style>
  /* Embed mode — hide demo UI labels when iframe-loaded as bg */
  .hud, .title, .meta { display: none !important; }
  body { background: transparent !important; overflow: hidden !important; margin: 0 !important; }
  canvas { display: block !important; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><span class="dot"></span>SHADER · 01 / COASTAL CURRENTS</div>
<h1 class="title">Coastal <em>currents.</em></h1>
<div class="meta">RUSZ MYSZKĄ · KLIKNIJ DLA FALI<br>SEA NAVY × SEA BLUE</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W = 0, H = 0, DPR = Math.min(2, devicePixelRatio || 1);
function size() {
  W = c.width = innerWidth * DPR; H = c.height = innerHeight * DPR;
  c.style.width = innerWidth + 'px'; c.style.height = innerHeight + 'px';
}
size(); addEventListener('resize', size);

const css = getComputedStyle(document.documentElement);
const accent = css.getPropertyValue('--color-accent').trim() || '#4F8EBA';
const dark = css.getPropertyValue('--color-dark').trim() || '#0D1B32';
const primary = css.getPropertyValue('--color-primary').trim() || '#CAC2AE';

const mouse = { x: 0.5, y: 0.5, vx: 0, vy: 0 };
let lx = 0.5, ly = 0.5;
addEventListener('mousemove', e => {
  const nx = e.clientX / innerWidth, ny = e.clientY / innerHeight;
  mouse.vx = nx - lx; mouse.vy = ny - ly;
  lx = nx; ly = ny;
  mouse.x = nx; mouse.y = ny;
});

const ripples = [];
addEventListener('click', e => {
  ripples.push({ x: e.clientX / innerWidth, y: e.clientY / innerHeight, t: 0 });
});

let t = 0;
let paused = false;
addEventListener('message', e => {
  if (e.data === 'shader-pause') paused = true;
  else if (e.data === 'shader-resume' && paused) { paused = false; frame(); }
});
function frame() {
  if (paused) return;
  t += 0.006;

  // base wash
  ctx.fillStyle = dark;
  ctx.fillRect(0, 0, W, H);

  // 9 layered sine waves, each pulled toward the cursor with a mass term
  const layers = 11;
  for (let L = 0; L < layers; L++) {
    const k = L / (layers - 1);
    ctx.beginPath();
    const yBase = H * (0.18 + k * 0.7);
    const amp = (40 + L * 16) * DPR;
    const freq = 0.0009 + L * 0.00015;
    const phase = t * (0.6 + k * 0.4);

    for (let x = 0; x <= W; x += 6 * DPR) {
      // distance from cursor (in canvas px)
      const cx = mouse.x * W, cy = mouse.y * H;
      const d = Math.hypot(x - cx, yBase - cy) / W;
      const pull = Math.exp(-d * 4) * 90 * DPR * (0.4 + k * 0.6);

      const y = yBase
        + Math.sin(x * freq + phase) * amp * 0.5
        + Math.sin(x * freq * 0.7 + phase * 1.3) * amp * 0.3
        - pull;

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();

    // tint: blend from dark to accent
    const a = 0.05 + k * 0.09;
    const grad = ctx.createLinearGradient(0, yBase - amp, 0, H);
    grad.addColorStop(0, `rgba(79,142,186,${a * 1.2})`);
    grad.addColorStop(1, `rgba(13,27,50,${a})`);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.t += 0.012;
    if (r.t > 1) { ripples.splice(i, 1); continue; }
    const rad = r.t * Math.max(W, H) * 0.6;
    const a = (1 - r.t) * 0.5;
    ctx.beginPath();
    ctx.arc(r.x * W, r.y * H, rad, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(79,142,186,${a})`;
    ctx.lineWidth = 1.4 * DPR;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(r.x * W, r.y * H, rad * 0.55, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(202,194,174,${a * 0.6})`;
    ctx.lineWidth = 0.8 * DPR;
    ctx.stroke();
  }

  // cursor halo
  const grd = ctx.createRadialGradient(mouse.x * W, mouse.y * H, 0, mouse.x * W, mouse.y * H, 240 * DPR);
  grd.addColorStop(0, 'rgba(79,142,186,0.18)');
  grd.addColorStop(1, 'rgba(79,142,186,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
